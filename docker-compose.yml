name: liansureprotect

services:
  postgres:
    image: ${LIANSUREPROTECT_POSTGRES_IMAGE:-pgvector/pgvector:0.8.2-pg16-trixie}
    container_name: liansureprotect-postgres
    environment:
      POSTGRES_DB: liansureprotect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - liansureprotect-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d liansureprotect"]
      interval: 5s
      timeout: 5s
      retries: 20

  # LocalStack emulates S3 on localhost so the M42 S3 document adapter can be developed and
  # round-trip tested with no AWS account or bill. It is opt-in: it only starts under the
  # "aws-local" compose profile, so the default dev/CI flow (Postgres only) is unaffected.
  #   docker compose --profile aws-local up -d
  localstack:
    image: localstack/localstack:3
    container_name: liansureprotect-localstack
    profiles: ["aws-local"]
    environment:
      SERVICES: s3,sns,sqs
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  liansureprotect-postgres-data:
